packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
  sharp: true
  # Optional native accelerator for BullMQ's msgpackr — JS fallback is fine,
  # and declining it keeps installs portable (no node-gyp on CI).
  msgpackr-extract: false
